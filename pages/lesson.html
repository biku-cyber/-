<!DOCTYPE html>
<html lang="as">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>শিকো আহা</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/lesson.css">
</head>
<body>

  <div class="lesson-container">
    <div class="progress-wrap">
      <div id="progressBar"></div>
    </div>

    <div class="progress-text">
      <span id="currentCount">১</span> / <span id="totalCount">১১</span>
    </div>

    <div class="lesson-card">
      <img id="lessonImage" class="lesson-image" alt="আখৰৰ ছবি">
      <h1 id="lessonLetter"></h1>
      <p id="lessonPronunciation"></p>
      <button id="soundBtn" class="sound-btn interactive-tap">🔊</button>
    </div>

    <div class="nav-buttons">
      <button id="prevBtn" class="interactive-tap">← পিছলৈ</button>
      <button id="nextBtn" class="interactive-tap">আগলৈ →</button>
    </div>
  </div>

  <script src="js/lesson.js"></script>
</body>
</html>
