<!DOCTYPE html>
<html lang="as">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>মোৰ প্ৰফাইল</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>

  <header class="profile-header">
    <img src="assets/logo/akhor-ghor-logo.png" class="profile-logo">
    <h1>মোৰ ট্ৰেক ৰেকৰ্ড</h1>
  </header>

  <section class="section">
    <h2>তোমাৰ অগ্ৰগতি</h2>
    <div class="progress-grid">
      <div class="progress-card">
        <h3>স্বৰবৰ্ণ</h3>
        <div id="swaraPercent">০%</div>
      </div>
      <div class="progress-card">
        <h3>ব্যঞ্জনবৰ্ণ</h3>
        <div id="vyanjanPercent">০%</div>
      </div>
      <div class="progress-card">
        <h3>সংখ্যা</h3>
        <div id="numberPercent">০%</div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>পুৰস্কাৰসমূহ 🏆</h2>
    <div id="achievementList"></div>
  </section>

  <section class="section">
    <h2>ছেটিংছ</h2>
    <div class="setting-item">
      <label>ৰাতিৰ মোড (Dark Mode)</label>
      <input type="checkbox" id="darkMode">
    </div>
    <div class="setting-item">
      <label>শব্দৰ প্ৰভাৱ (Audio)</label>
      <input type="checkbox" id="soundToggle" checked>
    </div>
  </section>

  <section class="section">
    <button id="resetBtn" class="interactive-tap">সকলো মচি পেলাওক (Reset)</button>
  </section>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item interactive-tap">
      <img src="assets/svg/home.svg">
      <span>ঘৰ</span>
    </a>
    <a href="learning.html" class="nav-item interactive-tap">
      <img src="assets/svg/learn.svg">
      <span>শিকো আহা</span>
    </a>
    <a href="profile.html" class="nav-item active interactive-tap">
      <img src="assets/svg/profile.svg">
      <span>মোৰ প্ৰফাইল</span>
    </a>
  </nav>

  <script src="js/profile.js"></script>
</body>
</html>
