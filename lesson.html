<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson - Akhor Ghor</title>
    <link rel="stylesheet" href="css/lesson.css">
</head>
<body>

    <div class="lesson-container">
        <div class="progress-wrap">
            <div id="progressBar"></div>
        </div>
        
        <div class="progress-text">
            <span id="currentCount">1</span> / <span id="totalCount">0</span>
        </div>

        <div class="lesson-card">
            <img id="lessonImage" class="lesson-image" src="" alt="Lesson Image">
            <h1 id="lessonLetter"></h1>
            <p id="lessonPronunciation"></p>
            <button id="soundBtn" class="sound-btn">🔊</button>
        </div>

        <div class="nav-buttons" style="display: flex; justify-content: space-between; margin-top: 20px; gap: 15px;">
            <button id="prevBtn" style="flex: 1; padding: 15px; border-radius: 15px; border: none; background: #ddd; font-weight: bold; font-size: 16px; cursor: pointer;">Previous</button>
            <button id="nextBtn" style="flex: 1; padding: 15px; border-radius: 15px; border: none; background: #2196f3; color: white; font-weight: bold; font-size: 16px; cursor: pointer;">Next</button>
        </div>
    </div>

    <script src="js/lesson.js"></script>
</body>
</html>
